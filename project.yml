# XcodeGen 스펙 — `brew install xcodegen` 후 저장소 루트에서 `xcodegen generate` 실행하면
# PhoneToPad.xcodeproj 가 생성됩니다. (수동 Xcode 설정은 README.md 참고)
name: PhoneToPad
options:
  bundleIdPrefix: com.mrnoh99
  deploymentTarget:
    iOS: "17.0"          # 아이패드 17.7 · 아이폰 26.5 모두 설치 가능하도록 17.0
  createIntermediateGroups: true
targets:
  PhoneToPad:
    type: application
    platform: iOS
    sources:
      - AppleMusicRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrnoh99.phonetopad
        INFOPLIST_FILE: AppleMusicRemote/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"   # 1=아이폰, 2=아이패드 (유니버설)
        SUPPORTS_MACCATALYST: YES        # Mac 플레이어(Tahoe) — osascript 곡 정보 조회
        MACCATALYST_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: 9AWEB9NYHH     # Jaisung Noh 개인 팀 (자동 서명)
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: AppleMusicRemote/PhoneToPad-Bridging-Header.h
        OTHER_LDFLAGS[sdk=macosx*]: -framework OSAKit
